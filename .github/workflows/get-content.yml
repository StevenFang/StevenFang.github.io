name: Update 1.json from URL

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pycryptodome idna

      - name: Fetch and decode JSON via jm.py
        env:
          URL: "https://raw.githubusercontent.com/ggrrttyyiii/CatVodSpider/refs/heads/main/json/demo.json"
        run: |
          python3 jm.py "$URL" > response.tmp 2>&1
          
          # 检查是否包含"解密失败"
          if grep -q "解密失败" response.tmp; then
            echo "jm.py failed or returned error:"
            cat response.tmp
            exit 1
          fi

      - name: Process JSON
        if: success()
        run: |
          set -e
          
          # 1. 从 response.tmp 中提取 JSON（从第一个 { 开始）
          sed -n '/{/,$p' response.tmp > extracted.json

          # 2. 定义要插入的 JSON 对象内容
          NEW_ITEM='{
            "key": "更新应用",
            "name": "更新应用",
            "type": 3,
            "api": "csp_Market",
            "searchable": 0,
            "changeable": 0,
            "ext": "https://xinxinbaobao.tk/fmys.json"
          }'

          # 3. 使用 jq 在 sites 数组的第一项之后插入该对象
          jq --argjson item "$NEW_ITEM" '.sites |= (.[0:1] + [$item] + .[1:])' extracted.json > 1.json.new

          # 4. 比较新旧文件，决定是否提交更新
          if [ ! -f 1.json ] || ! diff -q 1.json 1.json.new >/dev/null; then
            mv 1.json.new 1.json
            echo "Changes detected and JSON updated."
            echo "UPDATED=true" >> $GITHUB_ENV
          else
            echo "No changes detected."
            echo "UPDATED=false" >> $GITHUB_ENV
            rm 1.json.new
          fi
          
          # 清理产生的临时文件
          rm -f response.tmp extracted.json

      - name: Commit and push changes
        if: env.UPDATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add 1.json
          git commit -m "chore: update 1.json with injected site"
          git push
