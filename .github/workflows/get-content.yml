name: Update 1.json from URL

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pycryptodome idna

      - name: Fetch and decode JSON via jm.py
        env:
          URL: "https://raw.githubusercontent.com/ggrrttyyiii/CatVodSpider/refs/heads/main/json/demo.json"
        run: |
          python3 << 'EOF'
          import sys
          import subprocess

          URL = "${{ env.URL }}"

          # 调用 jm.py，通过 stdin 传入 URL
          try:
              proc = subprocess.run(["python3", "jm.py"],
                                     input=URL + "\n",
                                     text=True,
                                     capture_output=True,
                                     timeout=30)
          except Exception as e:
              print(f"::error::调用 jm.py 失败: {e}")
              sys.exit(1)

          if proc.returncode != 0:
              stderr_text = proc.stderr.strip()
              print(f"::error::jm.py 返回非零退出码: {stderr_text}")
              sys.exit(1)

          raw = proc.stdout

          # 检查是否包含"解密失败"
          if "解密失败" in raw:
              print("::error::返回内容包含「解密失败」")
              sys.exit(1)

          print(raw)
          EOF

      - name: Process JSON
        run: |
          set -e
          
          # 1. 找到 jm.py 生成的 JSON 文件（最新的时间戳文件）
          JSON_FILE=$(ls -t *.json 2>/dev/null | head -1)
          if [ -z "$JSON_FILE" ]; then
            echo "No JSON file generated by jm.py"
            exit 1
          fi
          
          cp "$JSON_FILE" extracted.json

          # 2. 定义要插入的 JSON 对象内容
          NEW_ITEM='{
            "key": "更新应用",
            "name": "更新应用",
            "type": 3,
            "api": "csp_Market",
            "searchable": 0,
            "changeable": 0,
            "ext": "https://xinxinbaobao.tk/fmys.json"
          }'

          # 3. 使用 jq 在 sites 数组的第一项之后插入该对象
          jq --argjson item "$NEW_ITEM" '.sites |= (.[0:1] + [$item] + .[1:])' extracted.json > 1.json.new

          # 4. 比较新旧文件，决定是否提交更新
          if [ ! -f 1.json ] || ! diff -q 1.json 1.json.new >/dev/null; then
            mv 1.json.new 1.json
            echo "Changes detected and JSON updated."
            echo "UPDATED=true" >> $GITHUB_ENV
          else
            echo "No changes detected."
            echo "UPDATED=false" >> $GITHUB_ENV
            rm 1.json.new
          fi
          
          # 清理产生的临时文件
          rm -f extracted.json "$JSON_FILE"

      - name: Commit and push changes
        if: env.UPDATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add 1.json
          git commit -m "chore: update 1.json with injected site"
          git push
